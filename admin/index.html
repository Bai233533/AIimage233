<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡密管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F5F7FA;
      color: #333;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #4A90E2 0%, #667EEA 100%);
      color: white;
      padding: 24px 32px;
      box-shadow: 0 2px 12px rgba(74, 144, 226, 0.3);
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header p { font-size: 14px; opacity: 0.8; margin-top: 4px; }
    .container { max-width: 900px; margin: 24px auto; padding: 0 20px; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #333;
    }
    .form-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .form-row label {
      font-size: 14px;
      color: #666;
      white-space: nowrap;
    }
    .form-row input {
      flex: 1;
      min-width: 120px;
      height: 40px;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      background: #F8F9FA;
    }
    .form-row input:focus {
      outline: none;
      border-color: #4A90E2;
      background: white;
    }
    .btn {
      height: 40px;
      padding: 0 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4A90E2 0%, #667EEA 100%);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3); }
    .btn-success {
      background: linear-gradient(135deg, #43A047 0%, #66BB6A 100%);
      color: white;
    }
    .btn-outline {
      background: white;
      color: #4A90E2;
      border: 1px solid #4A90E2;
    }
    .result-box {
      margin-top: 16px;
      background: #F8F9FA;
      border-radius: 8px;
      padding: 16px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.8;
      display: none;
    }
    .result-box.show { display: block; }
    .result-key {
      display: inline-block;
      background: white;
      border: 1px solid #E0E0E0;
      border-radius: 4px;
      padding: 2px 8px;
      margin: 2px 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .result-key:hover { border-color: #4A90E2; color: #4A90E2; }
    .result-key.copied { background: #E8F5E9; border-color: #43A047; color: #43A047; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #F0F0F0;
    }
    th {
      background: #F8F9FA;
      font-weight: 600;
      color: #666;
      font-size: 13px;
    }
    .status-unused { color: #43A047; font-weight: 600; }
    .status-used { color: #999; }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      background: #333;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>卡密管理后台</h1>
    <p>AI漫剧大师 - 会员卡密生成与管理</p>
  </div>

  <div class="container">
    <!-- 生成卡密 -->
    <div class="card">
      <div class="card-title">批量生成卡密</div>
      <div class="form-row">
        <label>管理员密钥：</label>
        <input type="password" id="adminSecret" placeholder="输入管理员密钥" value="ADMIN_2026">
        <label>生成数量：</label>
        <input type="number" id="keyCount" placeholder="数量" value="10" min="1" max="100">
        <button class="btn btn-primary" onclick="generateKeys()">生成卡密</button>
      </div>
      <div class="result-box" id="generateResult"></div>
    </div>

    <!-- 卡密列表 -->
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>卡密列表</span>
        <button class="btn btn-outline" onclick="loadKeys()">刷新列表</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>卡密</th>
              <th>状态</th>
              <th>生成时间</th>
              <th>使用时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="keyList">
            <tr><td colspan="5" style="text-align:center;color:#999;padding:20px;">请输入密钥后点击「刷新列表」</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // 注意：此页面需要配合微信云开发的HTTP API或后端服务使用
    // 当前为独立前端页面，卡密数据需要通过云函数接口操作
    // 实际部署时需配置云开发环境ID和接口地址

    const CONFIG = {
      // 替换为你的云开发环境ID
      envId: 'YOUR_CLOUD_ENV_ID',
      // 通过云函数HTTP触发器或自建后端访问
      apiBase: '' // 留空则使用云函数HTTP API
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function generateKeys() {
      const secret = document.getElementById('adminSecret').value.trim();
      const count = parseInt(document.getElementById('keyCount').value) || 10;

      if (!secret) { showToast('请输入管理员密钥'); return; }
      if (count < 1 || count > 100) { showToast('数量范围1-100'); return; }

      // 本地生成卡密（前端生成，实际使用时建议通过云函数）
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      const keys = [];
      for (let i = 0; i < count; i++) {
        let key = 'VIP-';
        for (let j = 0; j < 4; j++) key += chars.charAt(Math.floor(Math.random() * chars.length));
        key += '-';
        for (let j = 0; j < 4; j++) key += chars.charAt(Math.floor(Math.random() * chars.length));
        keys.push(key);
      }

      const resultBox = document.getElementById('generateResult');
      resultBox.innerHTML = '<div style="margin-bottom:8px;color:#666;">已生成 ' + keys.length + ' 个卡密（点击复制）：</div>' +
        keys.map(k => '<span class="result-key" onclick="copyKey(this,\'' + k + '\')">' + k + '</span>').join('');
      resultBox.classList.add('show');
      showToast('已生成 ' + keys.length + ' 个卡密');
    }

    function copyKey(el, key) {
      navigator.clipboard.writeText(key).then(() => {
        el.classList.add('copied');
        showToast('已复制: ' + key);
        setTimeout(() => el.classList.remove('copied'), 1500);
      }).catch(() => {
        // 降级方案
        const input = document.createElement('input');
        input.value = key;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        el.classList.add('copied');
        showToast('已复制: ' + key);
        setTimeout(() => el.classList.remove('copied'), 1500);
      });
    }

    async function loadKeys() {
      const secret = document.getElementById('adminSecret').value.trim();
      if (!secret) { showToast('请输入管理员密钥'); return; }

      showToast('请通过云函数接口查询卡密列表');
      // 实际使用时调用云函数：
      // wx.cloud.callFunction({ name: 'quickstartFunctions', data: { type: 'listCardKeys', adminSecret: secret } })
    }
  </script>
</body>
</html>
